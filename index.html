<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat Assistant</title>
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="page-wrapper">
      <!------- Header / Branding ------->
      <header class="site-header">
        <div class="header-top">
          <div class="brand-lockup" aria-label="L'Oreal branding">
            <img
              src="img/loreal-logo.png"
              alt="L'Oreal logo"
              class="brand-logo"
            />
          </div>

          <button
            type="button"
            id="themeToggle"
            class="theme-toggle"
            aria-label="Switch to dark mode"
            aria-pressed="false"
          >
            <span class="material-icons" id="themeIcon">dark_mode</span>
            <span id="themeLabel">Dark mode</span>
          </button>
        </div>

        <h1 class="site-title">Smart Product Advisor</h1>
      </header>

      <!------- Chat Area ------->
      <main>
        <section class="chatbox">
          <div id="chatWindow" class="chat-window">
            <!-- messages will be appended here via JS -->
          </div>

          <form id="chatForm" class="chat-form">
            <label for="userInput" class="visually-hidden">Message</label>
            <input
              id="userInput"
              name="userInput"
              type="text"
              placeholder="Ask me about products or routines…"
              autocomplete="off"
              required
            />

            <button type="submit" id="sendBtn">
              <span class="material-icons">send</span>
              <span class="visually-hidden">Send</span>
            </button>
          </form>
        </section>
      </main>

      <!------- Footer Links ------->
      <footer class="site-footer" aria-label="Footer">
        <div class="footer-brand">
          <span class="footer-brand-label"
            >L'Oréal-inspired beauty assistant</span
          >
          <p class="footer-copy">
            Personalized guidance for skincare, makeup, haircare, and fragrance.
          </p>
        </div>

        <nav class="footer-links" aria-label="Footer links">
          <!-- These URLs are placeholders -->
          <a href="#">Privacy Policy</a>
          <a href="#">Terms of Use</a>
          <a href="#">Contact</a>
        </nav>

        <p class="footer-note">© 2026 L'Oréal. All rights reserved.</p>
      </footer>
    </div>

    <!-- secrets.js can be removed when using Cloudflare Workers for API requests -->
    <script src="secrets.js"></script>
    <script src="script.js"></script>
  </body>
</html>
